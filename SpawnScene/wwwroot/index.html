<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpawnScene</title>
    <meta name="description"
        content="Create 3D scenes from images using Gaussian Splatting — entirely in your browser. Powered by SpawnDev.BlazorJS and SpawnDev.ILGPU." />
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="SpawnScene.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="loading-screen">
            <div class="loading-orb"></div>
            <div class="loading-text">Initializing GPU…</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script>
        // Helper for configuring WebGPU canvas context with custom usage flags.
        // SpawnDev.BlazorJS's C# type serialization doesn't include subclass properties,
        // so we create the config object natively in JS.
        window._configureCopyDstCanvas = function (ctx, device, usage) {
            ctx.configure({ device: device, format: 'rgba8unorm', usage: usage });
        };
    </script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
